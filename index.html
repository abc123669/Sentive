<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sentive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 全部CSS内嵌在这里 -->
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background-size:cover;background-position:center;background-attachment:fixed;
      transition:background 0.6s ease, color 0.3s ease;overflow:hidden
    }
    .glass{background:rgba(20,20,30,0.35);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}
    .controls{transition:opacity 0.8s ease}
    #time{text-shadow:0 0 30px rgba(255,255,255,0.35);transition:color 0.3s ease}
    #result-card{min-width:280px;max-width:90%;transition:all 0.3s ease;max-height:60vh;overflow-y:auto}
    #settings-panel{transform:translateY(20px);opacity:0;pointer-events:none;transition:all 0.3s ease}
    #settings-panel.active{transform:translateY(0);opacity:1;pointer-events:auto}
    .result-list{display:flex;flex-direction:column;gap:12px;padding:8px 0}
    .result-item{
      background:rgba(255,255,255,0.05);border-radius:8px;padding:16px;border-left:3px solid rgba(255,255,255,0.3);
      transition:all 0.3s ease;opacity:0;transform:translateX(-20px);animation:slideIn 0.4s ease forwards;
    }
    .result-item:hover{background:rgba(255,255,255,0.1);transform:translateX(5px)}
    .result-content{font-size:1.1rem;line-height:1.6;margin-bottom:8px}
    .result-meta{display:flex;gap:12px;font-size:0.85rem;opacity:0.7}
    .result-tag{background:rgba(255,255,255,0.1);padding:2px 8px;border-radius:4px}
    @keyframes slideIn{to{opacity:1;transform:translateX(0)}}
    .loading-bar{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin:12px 0}
    .loading-bar::after{content:'';display:block;height:100%;width:30%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);animation:loading 1s infinite}
    @keyframes loading{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    .loading-text{text-align:center;padding:20px;opacity:0.7;font-size:0.95rem}
    .result-count{font-size:0.85rem;opacity:0.6;margin-bottom:12px;text-align:center}
    @media(max-width:640px){
      #result-card{max-width:95%;min-width:auto}
      .result-content{font-size:1rem}
      .result-item{padding:12px}
    }
  </style>
</head>

<body class="bg-[#121218] text-white">
  <!-- 时间 -->
  <div id="time" class="text-[clamp(3rem,8vw,7rem)] font-light tracking-wider mb-8">00:00:00</div>

  <!-- 控件 -->
  <div class="controls w-full max-w-2xl px-4 flex flex-col gap-5 items-center">
    <div class="w-full relative">
      <input id="search" placeholder="搜索句子..." class="w-full px-5 py-3 rounded-lg glass text-lg outline-none">
      <button id="search-btn" class="absolute right-3 top-1/2 -translate-y-1/2 px-3 py-1 rounded bg-white/10 hover:bg-white/20">搜索</button>
    </div>
    <div id="result-card" class="glass rounded-lg px-6 py-4 w-fit cursor-pointer hover:bg-white/5">
      <div id="result-container"><p class="text-lg text-center">点击卡片获取随机句子</p></div>
    </div>
  </div>

  <!-- 设置按钮 -->
  <button id="setting-btn" class="controls fixed bottom-4 right-4 w-10 h-10 rounded-full glass flex items-center justify-center">⚙️</button>

  <!-- 设置面板 -->
  <div id="settings-panel" class="fixed bottom-16 right-4 w-72 p-4 rounded-lg glass flex flex-col gap-3">
    <h3 class="text-sm font-bold mb-1">Sentive 设置</h3>
    <div class="flex flex-col gap-2">
      <label class="text-xs text-gray-300">服务端IP</label>
      <input id="server-ip" placeholder="输入服务端IP地址" class="px-3 py-2 rounded glass text-sm outline-none">
      <select id="preset-ip" class="px-3 py-2 rounded glass text-sm outline-none">
        <option value="http://localhost:5000">本地 localhost:5000</option>
        <option value="http://127.0.0.1:5000">本地 127.0.0.1:5000</option>
      </select>
    </div>
    <input id="bg-link" placeholder="背景图链接 回车应用" class="px-3 py-2 rounded glass text-sm outline-none">
    <input type="file" id="bg-upload" accept="image/*" class="text-sm opacity-80">
    <select id="bg-preset" class="px-3 py-2 rounded glass text-sm outline-none">
      <option value="">选择背景预设</option>
    </select>
    <input type="color" id="font-color" class="w-full h-8 rounded cursor-pointer">
    <select id="font-family" class="px-3 py-2 rounded glass text-sm outline-none">
      <option value="system-ui">默认字体</option>
      <option value="Arial">Arial</option>
      <option value="Microsoft YaHei">微软雅黑</option>
      <option value="SimHei">黑体</option>
    </select>
  </div>

  <script>
    // 全局变量
    let API, hideTimer, controls, bgPresets = []
    let defaultBgId = "starry-night"

    // 页面加载
    window.onload = ()=>{
      API = localStorage.getItem("sentive-api") || "http://localhost:5000"
      controls = document.querySelectorAll(".controls")
      setTimeout(()=>document.documentElement.requestFullscreen().catch(()=>{}),300)
      initAll()
    }

    // 初始化所有功能
    async function initAll(){
      updateTime()
      setInterval(updateTime,1000)
      await loadBgPresets()
      loadSettings()
      initEvents()
      fetchRandom()
      startHideTimer()
    }

    // 加载背景预设
    async function loadBgPresets(){
      try{
        const res = await fetch(`${API}/api/bg-presets`)
        if(!res.ok) throw new Error()
        const data = await res.json()
        bgPresets = data.presets
        defaultBgId = data.default
        
        const select = document.getElementById('bg-preset')
        select.innerHTML = '<option value="">选择背景预设</option>'
        bgPresets.forEach(p=>{
          const opt = document.createElement('option')
          opt.value = p.id
          opt.textContent = p.name
          select.appendChild(opt)
        })
      }catch(e){
        bgPresets = [{id:'starry-night',name:'星空',url:'https://images.unsplash.com/photo-1506744038136-46273834b3fb'}]
      }
    }

    // 更新时间
    function updateTime(){
      document.getElementById("time").innerText = new Date().toLocaleTimeString("zh-CN",{hour12:false})
    }

    // 自动隐藏控件
    function startHideTimer(){
      clearTimeout(hideTimer)
      controls.forEach(e=>e.style.opacity=1)
      hideTimer = setTimeout(()=>controls.forEach(e=>e.style.opacity=0),5000)
    }

    // 加载设置
    function loadSettings(){
      const bg = localStorage.getItem("sentive-bg")
      const color = localStorage.getItem("sentive-color")||"#fff"
      const font = localStorage.getItem("sentive-font")||"system-ui"
      const api = localStorage.getItem("sentive-api")||"http://localhost:5000"
      const defaultPreset = bgPresets.find(p=>p.id===defaultBgId)||bgPresets[0]

      if(bg){
        document.body.style.backgroundImage = `url(${bg})`
        document.getElementById("bg-link").value = bg
        const match = bgPresets.find(p=>p.url===bg)
        if(match) document.getElementById("bg-preset").value = match.id
      }else if(defaultPreset){
        document.body.style.backgroundImage = `url(${defaultPreset.url})`
        document.getElementById("bg-link").value = defaultPreset.url
        document.getElementById("bg-preset").value = defaultPreset.id
        localStorage.setItem("sentive-bg", defaultPreset.url)
      }

      document.getElementById("time").style.color = color
      document.body.style.fontFamily = font
      document.getElementById("font-color").value = color
      document.getElementById("font-family").value = font
      document.getElementById("server-ip").value = api
      document.getElementById("preset-ip").value = api
    }

    // 绑定事件
    function initEvents(){
      document.addEventListener("mousemove",startHideTimer)
      document.addEventListener("touchstart",startHideTimer)
      
      const settingBtn = document.getElementById("setting-btn")
      const panel = document.getElementById("settings-panel")
      settingBtn.onclick = ()=>panel.classList.toggle("active")

      document.getElementById("search-btn").onclick = ()=>{
        const kw = document.getElementById("search").value.trim()
        kw && search(kw)
      }

      document.getElementById("result-card").onclick = fetchRandom

      document.getElementById("search").onkeydown = (e)=>{
        e.key==="Enter" && search(e.target.value.trim())
      }

      document.getElementById("bg-link").onkeydown = (e)=>{
        if(e.key==="Enter"){
          const url = e.target.value.trim()
          document.body.style.backgroundImage = `url(${url})`
          localStorage.setItem("sentive-bg",url)
        }
      }

      document.getElementById("bg-upload").onchange = (e)=>{
        const file = e.target.files[0]
        if(!file) return
        const reader = new FileReader()
        reader.onload = (ev)=>{
          document.body.style.backgroundImage = `url(${ev.target.result})`
          localStorage.setItem("sentive-bg",ev.target.result)
          document.getElementById("bg-link").value = "本地图片"
        }
        reader.readAsDataURL(file)
      }

      document.getElementById("font-color").oninput = (e)=>{
        const c = e.target.value
        document.getElementById("time").style.color = c
        localStorage.setItem("sentive-color",c)
      }

      document.getElementById("font-family").onchange = (e)=>{
        const f = e.target.value
        document.body.style.fontFamily = f
        localStorage.setItem("sentive-font",f)
      }

      document.getElementById("server-ip").onkeydown = (e)=>{
        if(e.key==="Enter"){
          const ip = e.target.value.trim()
          if(ip){
            API = ip
            localStorage.setItem("sentive-api",ip)
            document.getElementById("preset-ip").value = ip
          }
        }
      }

      document.getElementById("preset-ip").onchange = (e)=>{
        const ip = e.target.value
        if(ip){
          API = ip
          localStorage.setItem("sentive-api",ip)
          document.getElementById("server-ip").value = ip
        }
      }

      document.getElementById("bg-preset").onchange = (e)=>{
        const pid = e.target.value
        if(pid){
          const p = bgPresets.find(p=>p.id===pid)
          if(p){
            document.body.style.backgroundImage = `url(${p.url})`
            localStorage.setItem("sentive-bg", p.url)
            document.getElementById("bg-link").value = p.url
          }
        }
      }
    }

    // 获取随机句子
    async function fetchRandom(){
      try{
        const d = await (await fetch(API+"/api/random")).json()
        showSingle(d.sentence)
      }catch(e){
        showSingle("请启动后端服务")
      }
    }

    // 显示单句
    function showSingle(s){
      const con = document.getElementById("result-container")
      if(typeof s==='object'){
        con.innerHTML = `
          <div class="result-list">
            <div class="result-item">
              <div class="result-content">${s.content}</div>
              <div class="result-meta">
                <span class="result-tag">${s.author}</span>
                <span class="result-tag">${s.category}</span>
              </div>
            </div>
          </div>`
      }else{
        con.innerHTML = `<p class="text-lg text-center">${s}</p>`
      }
    }

    // 搜索
    async function search(kw){
      if(!kw) return
      document.getElementById("result-container").innerHTML = `<div class="loading-text">正在搜索...</div><div class="loading-bar"></div>`
      try{
        const d = await (await fetch(API+"/api/search?kw="+encodeURIComponent(kw))).json()
        const con = document.getElementById("result-container")
        if(!d.results.length){
          con.innerHTML = `<p class="text-lg text-center">未找到匹配句子</p>`
          return
        }
        let html = `<div class="result-count">找到 ${d.count} 条结果</div><div class="result-list">`
        d.results.forEach((i,idx)=>{
          html += `
            <div class="result-item" style="animation-delay:${idx*0.08}s">
              <div class="result-content">${i.content}</div>
              <div class="result-meta">
                <span class="result-tag">${i.author}</span>
                <span class="result-tag">${i.category}</span>
              </div>
            </div>`
        })
        con.innerHTML = html + '</div>'
      }catch(e){
        document.getElementById("result-container").innerHTML = `<p class="text-lg text-center">搜索失败</p>`
      }
    }
  </script>
</body>
</html>
